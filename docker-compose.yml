services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: stockviz
      POSTGRES_USER: stockviz
      POSTGRES_PASSWORD: stockviz
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stockviz"]
      interval: 5s
      retries: 5

  migrate:
    image: ghcr.io/amacneil/dbmate:2
    command: up
    environment:
      DATABASE_URL: postgres://stockviz:stockviz@db:5432/stockviz?sslmode=disable
    volumes:
      - ./db/migrations:/db/migrations:ro
    depends_on:
      db:
        condition: service_healthy

  db-ready:
    image: alpine:3
    command: ["sh", "-c", "while true; do sleep 3600; done"]
    healthcheck:
      test: ["CMD", "true"]
      interval: 1s
      retries: 1
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  backend:
    build:
      context: ./backend
      network: host
      args:
        DATABASE_URL: postgres://stockviz:stockviz@localhost:5432/stockviz?sslmode=disable
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      DATABASE_URL: postgres://stockviz:stockviz@db:5432/stockviz?sslmode=disable
    depends_on:
      db-ready:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider http://127.0.0.1:3001/currencies"]
      interval: 3s
      retries: 10
      start_period: 5s

  dev-tools:
    build:
      context: ./backend
      target: dev-tools
    user: "${UID}:${GID}"
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    environment:
      DATABASE_URL: postgres://stockviz:stockviz@db:5432/stockviz?sslmode=disable
    ports:
      - "3001:3001"

volumes:
  db_data:
  backend_node_modules:

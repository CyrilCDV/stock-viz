version: '3'

tasks:
  # Work tasks — environment-agnostic, called by CI and locally
  build:
    desc: Build the backend
    cmds:
      - cd backend && npm run build

  test:
    desc: Run backend tests
    cmds:
      - cd backend && npm test

  check:
    desc: Lint and check formatting
    cmds:
      - cd backend && npm run check

  clean:
    desc: Remove build artifacts and generated files
    cmds:
      - cd backend && npm run clean

  # Local tasks — spin up the environment before running
  build:local:
    desc: Start database, run migrations, and build (generates schema.ts)
    cmds:
      - docker compose up db --wait
      - docker compose run --rm migrate
      - task build

  dev:
    desc: Start database and backend in development mode
    cmds:
      - docker compose up db --wait
      - docker compose run --rm migrate
      - cd backend && npm run dev

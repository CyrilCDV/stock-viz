version: '3'

tasks:
  build:
    desc: Introspect database schema and compile TypeScript
    cmds:
      - defer: docker compose down
      - docker compose up db-ready --wait
      - cd backend && npm run db:introspect
      - cd backend && npm run build

  test:
    desc: Run backend unit tests
    cmds:
      - cd backend && npm test

  check:
    desc: Lint and format check
    cmds:
      - cd backend && npm run check

  clean:
    desc: Remove build artifacts and generated files
    cmds:
      - cd backend && npm run clean

  dev:
    desc: Start database and backend in development mode
    cmds:
      - docker compose up db-ready --wait
      - cd backend && npm run dev

  e2e:
    desc: Start the full stack and run end-to-end tests
    cmds:
      - docker compose up db-ready --wait
      - docker compose -f docker-compose.yml -f e2e/docker-compose.yml build --build-arg CACHE_BUST=$(date +%s) backend seed e2e
      - docker compose -f docker-compose.yml -f e2e/docker-compose.yml run --rm e2e

  debug:
    desc: Start database and backend with Node.js debugger on port 9229
    cmds:
      - docker compose up db-ready --wait
      - docker compose -f docker-compose.yml -f docker-compose.debug.yml build --build-arg CACHE_BUST=$(date +%s) backend
      - docker compose -f docker-compose.yml -f docker-compose.debug.yml up backend
